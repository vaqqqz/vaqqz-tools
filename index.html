<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy CLI Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Проверка прокси</h1>
        <div class="blinking-cursor"></div>
    </div>
    
    <div class="input-group">
        <label>// Введите ссылки на TXT-файлы (каждая с новой строки)</label>
        <textarea id="urls" placeholder="https://raw.githubusercontent.com/..."></textarea>
    </div>

    <div class="input-group">
        <label>// Приоритетные теги (через запятую, например: RU,DE,US)</label>
        <input id="filterTags" placeholder="RU,DE,US">
    </div>
    
    <div class="controls">
        <button id="executeBtn">ОТСОРТИРОВАТЬ</button>
        <button id="copyBtn">СКОПИРОВАТЬ КОНФИГИ</button>
        <button id="downloadBtn">СКАЧАТЬ TXT</button>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="terminal-title">bash — root@proxy-node:~</div>
        </div>
        <div class="terminal-body" id="output">
            <span class="terminal-line">
                <span class="terminal-prefix">$</span> Система готова. Ожидание команды...
            </span>
        </div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const outputDiv = document.getElementById('output');
    const executeBtn = document.getElementById('executeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const urlsInput = document.getElementById('urls');
    const tagInput = document.getElementById('filterTags');

    let finalProxies = [];

    function log(text, success = false) {
        const line = document.createElement('span');
        line.className = 'terminal-line' + (success ? ' success' : '');

        const prefix = document.createElement('span');
        prefix.className = 'terminal-prefix';
        prefix.textContent = '$';

        line.appendChild(prefix);
        line.append(' ' + text);

        outputDiv.appendChild(line);

        if (outputDiv.children.length > 300) {
            outputDiv.removeChild(outputDiv.firstChild);
        }

        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    async function fetchWithTimeout(url, timeout = 10000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            return await fetch(url, { signal: controller.signal });
        } finally {
            clearTimeout(id);
        }
    }

    async function startProcessing() {
        const urlsText = urlsInput.value.trim();
        const tags = tagInput.value
            .toUpperCase()
            .split(',')
            .map(t => t.trim())
            .filter(Boolean);

        if (!urlsText) {
            log('ОШИБКА: Список пуст.');
            return;
        }

        executeBtn.disabled = true;
        outputDiv.innerHTML = '';
        finalProxies = [];

        const urls = urlsText.split('\n').map(u => u.trim()).filter(Boolean);

        let allFound = [];

        log('ProxyPulse Engine: Запуск...');

        for (let i = 0; i < urls.length; i++) {
            log('Parsing source ' + (i + 1) + '...');

            try {
                const api = 'https://api.allorigins.win/get?url=' + encodeURIComponent(urls[i]);
                const res = await fetchWithTimeout(api);

                if (!res.ok) throw new Error();

                const data = await res.json();

                if (data && data.contents) {
                    const rawLines = data.contents.split('\n');
                    const protocols = ['vless://', 'vmess://', 'trojan://', 'ss://', 'hysteria://', 'tuic://'];

                    const extracted = rawLines.map(line => {
                        const l = line.trim();
                        for (let proto of protocols) {
                            const idx = l.indexOf(proto);
                            if (idx !== -1) return l.substring(idx);
                        }
                        return null;
                    }).filter(Boolean);

                    allFound = allFound.concat(extracted);
                    log('Extracted: ' + extracted.length, true);
                }
            } catch (e) {
                log('Error: Node unreachable.');
            }
        }

        allFound = [...new Set(allFound)];

        let priority = [];
        let others = [];

        allFound.forEach(proxy => {
            let isPriority = false;
            tags.forEach(tag => {
                if (proxy.toUpperCase().includes(tag)) {
                    isPriority = true;
                }
            });

            if (isPriority) priority.push(proxy);
            else others.push(proxy);
        });

        finalProxies = priority.concat(others);

        log('--------------------------------');
        log('CLEANUP COMPLETE', true);
        log('Sorted by priority: ' + priority.length);
        log('Total unique nodes: ' + finalProxies.length, true);

        executeBtn.disabled = false;
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
    }

    function copyData() {
        if (!finalProxies.length) {
            log('Ошибка: Список пуст.');
            return;
        }

        const text = finalProxies.join('\n');

        if (navigator.clipboard) {
            navigator.clipboard.writeText(text)
                .then(() => log('SUCCESS: Data copied to clipboard.', true))
                .catch(() => {
                    fallbackCopy(text);
                    log('Скопировано (fallback).', true);
                });
        } else {
            fallbackCopy(text);
            log('Скопировано (fallback).', true);
        }
    }

    function downloadFile(filename, text) {
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;

        document.body.appendChild(a);
        a.click();

        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function downloadData() {
        if (!finalProxies.length) {
            log('ОШИБКА: Нечего скачивать.');
            return;
        }

        const text = finalProxies.join('\n');

        const date = new Date()
            .toISOString()
            .slice(0,19)
            .replace(/[:T]/g, '-');

        const filename = `proxies_${date}.txt`;

        downloadFile(filename, text);
        log(`Файл ${filename} скачан.`, true);
    }

    executeBtn.onclick = startProcessing;
    copyBtn.onclick = copyData;
    downloadBtn.onclick = downloadData;
});
</script>

</body>
</html>
