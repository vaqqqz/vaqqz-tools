<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy CLI Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Проверка прокси</h1>
        <div class="blinking-cursor"></div>
    </div>
    
    <div class="input-group">
        <label>// Введите ссылки на TXT-файлы (каждая с новой строки)</label>
        <textarea id="urls" placeholder="https://raw.githubusercontent.com/..."></textarea>
    </div>
    
    <div class="controls">
        <button id="executeBtn">ОТСОРТИРОВАТЬ</button>
        <button id="copyBtn">СКОПИРОВАТЬ КОНФИГИ</button>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="terminal-title">bash — root@proxy-node:~</div>
        </div>
        <div class="terminal-body" id="output">
            <span class="terminal-line"><span class="terminal-prefix">$</span> Система готова. Ожидание команды...</span>
        </div>
    </div>
</div>

<script>
    // Ждем полной загрузки DOM
    window.addEventListener('DOMContentLoaded', () => {
        const outputDiv = document.getElementById('output');
        const executeBtn = document.getElementById('executeBtn');
        const copyBtn = document.getElementById('copyBtn');
        const urlsInput = document.getElementById('urls');
        
        let finalProxies = [];

        function logToTerminal(text, isSuccess = false) {
            const line = document.createElement('span');
            line.className = 'terminal-line' + (isSuccess ? ' success' : '');
            line.innerHTML = '<span class="terminal-prefix">$</span> ' + text;
            outputDiv.appendChild(line);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        async function startProcessing() {
            const urlsText = urlsInput.value.trim();
            if (!urlsText) {
                logToTerminal('ОШИБКА: Список ссылок пуст.');
                return;
            }

            outputDiv.innerHTML = ''; 
            finalProxies = [];
            
            const urls = urlsText.split('\n').map(url => url.trim()).filter(url => url);
            logToTerminal(`Запуск... Найдено источников: ${urls.length}`);

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                logToTerminal(`Запрос [${i + 1}/${urls.length}]: Загрузка...`);
                
                try {
                    // Используем сервис для обхода CORS
                    const apiUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
                    const response = await fetch(apiUrl);
                    
                    if (!response.ok) throw new Error('Network error');
                    
                    const data = await response.json();
                    
                    if (data.contents) {
                        const lines = data.contents.split('\n');
                        const filtered = lines.map(l => l.trim()).filter(line => 
                            line.startsWith('vless://') || 
                            line.startsWith('vmess://') || 
                            line.startsWith('trojan://') || 
                            line.startsWith('ss://')
                        );
                        
                        if (filtered.length > 0) {
                            finalProxies = finalProxies.concat(filtered);
                            logToTerminal(`OK: Получено ${filtered.length} конфигов.`, true);
    } else {
                            logToTerminal(`FAIL: Прокси в файле не найдены.`);
                        }
                    }
                } catch (e) {
                    logToTerminal(`ОШИБКА: Не удалось прочитать источник.`);
                }
            }

            finalProxies = [...new Set(finalProxies)];
            logToTerminal('-----------------------------------');
            logToTerminal(`ГОТОВО. Уникальных прокси: ${finalProxies.length}`, true);
        }

        function copyData() {
            if (finalProxies.length === 0) {
                logToTerminal('ОШИБКА: Нечего копировать.');
                return;
            }
            const textToCopy = finalProxies.join('\n');
            navigator.clipboard.writeText(textToCopy).then(() => {
                logToTerminal('ИНФО: Список скопирован в буфер.', true);
            }).catch(() => {
                logToTerminal('ОШИБКА: Нет доступа к буферу обмена.');
            });
        }

        // Привязываем события
        executeBtn.onclick = startProcessing;
        copyBtn.onclick = copyData;
    });
</script>

</body>
</html>
