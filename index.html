<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Aggregator CLI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Proxy_CLI</h1>
        <span class="blinking-cursor"></span>
    </div>
    
    <div class="input-group">
        <label for="urls">// Введите ссылки на TXT-файлы (каждая с новой строки)</label>
        <textarea id="urls" placeholder="https://raw.githubusercontent.com/example/proxies.txt"></textarea>
    </div>
    
    <div class="controls">
        <button onclick="processProxies()">[ Execute ]</button>
        <button onclick="copyToClipboard()">[ Copy Output ]</button>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <span class="terminal-title">bash - root@proxy-node:~</span>
        </div>
        <div class="terminal-body" id="output">
            <span class="terminal-line"><span class="terminal-prefix">$</span> Ожидание команд...</span>
        </div>
    </div>
</div>

<script>
    const outputDiv = document.getElementById('output');
    let finalProxies = []; // Храним чистый список для копирования

    // Функция для добавления строк в терминал
    function logToTerminal(text, isSuccess = false) {
        const line = document.createElement('span');
        line.className = 'terminal-line' + (isSuccess ? ' success' : '');
        line.innerHTML = `<span class="terminal-prefix">$</span> ${text}`;
        outputDiv.appendChild(line);
        // Автоскролл вниз
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    // Очистка терминала
    function clearTerminal() {
        outputDiv.innerHTML = '';
        finalProxies = [];
    }

    async function processProxies() {
        const urlsText = document.getElementById('urls').value.trim();
        
        if (!urlsText) {
            alert('Поле ввода пустое!');
            return;
        }

        clearTerminal();
        const urls = urlsText.split('\n').map(url => url.trim()).filter(url => url);
        
        logToTerminal(`Инициализация... Обнаружено источников: ${urls.length}`);
        
        let allProxies = [];

        for (let i = 0; i < urls.length; i++) {
            const url = urls[i];
            logToTerminal(`Загрузка [${i+1}/${urls.length}]: ${url.substring(0, 40)}...`);
            
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                if (data.contents) {
                    const lines = data.contents.split('\n');
                    const filtered = lines.map(line => line.trim()).filter(line => 
                        line.startsWith('vless://') || 
                        line.startsWith('vmess://') || 
                        line.startsWith('trojan://') || 
                        line.startsWith('ss://')
                    );
                    allProxies = allProxies.concat(filtered);
                    logToTerminal(`Успех. Извлечено прокси: ${filtered.length}`, true);
                } else {
                    logToTerminal(`Ошибка: Нет данных по этой ссылке.`);
                }
            } catch (e) {
                logToTerminal(`Ошибка соединения с источником.`);
            }
        }

        const uniqueProxies = [...new Set(allProxies)];
        finalProxies = uniqueProxies;

        logToTerminal('-----------------------------------');
        logToTerminal(Агрегация завершена. Уникальных прокси: ${uniqueProxies.length});
        
        if (uniqueProxies.length > 0) {
            logToTerminal('Генерация списка...', true);
            // Выводим сами прокси в терминал
            uniqueProxies.forEach(proxy => {
                logToTerminal(proxy, true);
            });
        }
    }

    function copyToClipboard() {
        if (finalProxies.length === 0) {
            alert('Нет данных для копирования!');
            return;
        }
        const textToCopy = finalProxies.join('\n');
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert(Скопировано прокси: ${finalProxies.length});
        }).catch(err => {
            alert('Ошибка копирования. Попробуйте вручную.');
        });
    }
</script>

</body>
</html>
