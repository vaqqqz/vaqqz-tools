<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy CLI Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Proxy_CLI</h1>
        <span class="blinking-cursor"></span>
    </div>
    
    <div class="input-group">
        <label for="urls">// Введите ссылки на TXT-файлы (каждая с новой строки)</label>
        <textarea id="urls" placeholder="https://raw.githubusercontent.com/example/proxies.txt"></textarea>
    </div>
    
    <div class="controls">
        <button id="executeBtn">[ Execute ]</button>
        <button id="copyBtn">[ Copy Output ]</button>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <span class="terminal-title">bash - root@proxy-node:~</span>
        </div>
        <div class="terminal-body" id="output">
            <span class="terminal-line"><span class="terminal-prefix">$</span> Система готова. Ожидание команды Execute...</span>
        </div>
    </div>
</div>

<script>
    // Весь код оборачиваем в проверку загрузки страницы
    window.addEventListener('load', () => {
        const outputDiv = document.getElementById('output');
        const executeBtn = document.getElementById('executeBtn');
        const copyBtn = document.getElementById('copyBtn');
        const urlsInput = document.getElementById('urls');
        
        let finalProxies = [];

        function logToTerminal(text, isSuccess = false) {
            const line = document.createElement('span');
            line.className = 'terminal-line' + (isSuccess ? ' success' : '');
            line.innerHTML = `<span class="terminal-prefix">$</span> ${text}`;
            outputDiv.appendChild(line);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        async function startProcessing() {
            const urlsText = urlsInput.value.trim();
            if (!urlsText) {
                logToTerminal('ОШИБКА: Поле ввода пустое.');
                return;
            }

            outputDiv.innerHTML = ''; 
            finalProxies = [];
            
            const urls = urlsText.split('\n').map(url => url.trim()).filter(url => url);
            logToTerminal(`Запуск... Найдено источников: ${urls.length}`);

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                logToTerminal(`Запрос [${i+1}/${urls.length}]: ${url.substring(0, 30)}...`);
                
                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    
                    if (data.contents) {
                        const lines = data.contents.split('\n');
                        const filtered = lines.map(l => l.trim()).filter(line => 
                            line.startsWith('vless://') || 
                            line.startsWith('vmess://') || 
                            line.startsWith('trojan://') || 
                            line.startsWith('ss://')
                        );
                        
                        if (filtered.length > 0) {
                            finalProxies = finalProxies.concat(filtered);
                            logToTerminal(`OK: Получено ${filtered.length} конфигов.`, true);
                        } else {
                            logToTerminal(`FAIL: Прокси не обнаружены.`);
                        }
                    }
                } catch (e) {
                    logToTerminal(`ОШИБКА: Ошибка доступа к файлу.`);
                }
            }
            finalProxies = [...new Set(finalProxies)];
            logToTerminal('-----------------------------------');
            logToTerminal(ЗАВЕРШЕНО. Уникальных прокси: ${finalProxies.length}, true);
        }

        function copyData() {
            if (finalProxies.length === 0) {
                logToTerminal('ОШИБКА: Буфер пуст.');
                return;
            }
            navigator.clipboard.writeText(finalProxies.join('\n')).then(() => {
                logToTerminal('ИНФО: Список скопирован в буфер.', true);
            });
        }

        // ПРИВЯЗКА КНОПОК К ФУНКЦИЯМ
        if (executeBtn) executeBtn.onclick = startProcessing;
        if (copyBtn) copyBtn.onclick = copyData;
    });
</script>

</body>
</html>
