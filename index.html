<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy AMOLED Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Proxy Aggregator</h1>
    
    <label>Введите ссылки на TXT файлы:</label>
    <textarea id="urls" placeholder="https://raw.githubusercontent.com/..."></textarea>
    
    <div class="controls">
        <button class="btn-run" onclick="processProxies()">Собрать прокси</button>
        <button class="btn-copy" onclick="copyToClipboard()">Копировать все</button>
    </div>

    <div class="status" id="status">Система готова</div>
    <div id="output">Здесь появится результат...</div>
</div>

<script>
    async function processProxies() {
        const urlsText = document.getElementById('urls').value.trim();
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        
        if (!urlsText) {
            alert('Введите ссылки!');
            return;
        }

        const urls = urlsText.split('\n').map(url => url.trim()).filter(url => url);
        status.innerText = 'Выполняется запрос...';
        
        let allProxies = [];

        for (let url of urls) {
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                if (data.contents) {
                    const lines = data.contents.split('\n');
                    const filtered = lines.map(line => line.trim()).filter(line => 
                        line.startsWith('vless://') || 
                        line.startsWith('vmess://') || 
                        line.startsWith('trojan://') || 
                        line.startsWith('ss://')
                    );
                    allProxies = allProxies.concat(filtered);
                }
            } catch (e) {
                console.error('Ошибка:', url);
            }
        }

        const uniqueProxies = [...new Set(allProxies)];
        output.innerText = uniqueProxies.length > 0 ? uniqueProxies.join('\n') : 'Ничего не найдено.';
        status.innerText = `Найдено: ${uniqueProxies.length}`;
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        if (text === 'Здесь появится результат...') return;
        navigator.clipboard.writeText(text).then(() => {
            alert('Скопировано!');
        });
    }
</script>

</body>
</html>
