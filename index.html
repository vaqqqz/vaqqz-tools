<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy CLI Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Проверка прокси</h1>
        <div class="blinking-cursor"></div>
    </div>
    
    <div class="input-group">
        <label>// Введите ссылки на TXT-файлы (каждая с новой строки)</label>
        <textarea id="urls" placeholder="https://raw.githubusercontent.com/..."></textarea>
    </div>

    <div class="input-group">
        <label>// Приоритетные теги (через запятую, например: RU,DE,US)</label>
        <input id="filterTags" placeholder="RU,DE,US">
    </div>
    
    <div class="controls">
        <button id="executeBtn">ОТСОРТИРОВАТЬ</button>
        <button id="copyBtn">СКОПИРОВАТЬ КОНФИГИ</button>
        <button id="downloadBtn">СКАЧАТЬ TXT</button>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="terminal-title">bash — root@proxy-node:~</div>
        </div>
        <div class="terminal-body" id="output">
            <span class="terminal-line">
                <span class="terminal-prefix">$</span> Система готова. Ожидание команды...
            </span>
        </div>
    </div>
</div>

<script>
(function() {
    const out = document.getElementById('output');
    const urlInput = document.getElementById('urls');
    const tagInput = document.getElementById('filterTags');
    const executeBtn = document.getElementById('executeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let finalSelection = [];

    const MY_WORKER_URL = 'https://mycoreproxy.felame29.workers.dev/?u=';

    function log(msg, ok = false) {
        const span = document.createElement('span');
        span.className = 'terminal-line' + (ok ? ' success' : '');
        span.innerHTML = '<span class="terminal-prefix">$</span> ' + msg;
        out.appendChild(span);
        out.scrollTop = out.scrollHeight;
    }

    async function run() {
        const val = urlInput.value.trim();
        const tags = tagInput.value.toUpperCase().split(',').map(t => t.trim()).filter(t => t);
        
        if (!val) { log('Ошибка: Списки пустые.'); return; }

        out.innerHTML = '';
        let allFound = [];
        const links = val.split('\n').filter(l => l.trim());

        log('Инициализация...');

        for (let i = 0; i < links.length; i++) {
            const currentUrl = links[i].trim();
            log('Parsing source ' + (i + 1) + '...');

            try {
                const response = await fetch(MY_WORKER_URL + encodeURIComponent(currentUrl));
                if (!response.ok) throw new Error('Status: ' + response.status);

                const contents = await response.text();
                
                const rawLines = contents.split('\n');
                const protocols = ['vless://', 'vmess://', 'trojan://', 'ss://'];

                const extracted = rawLines.map(line => {
                    const l = line.trim();
                    for (let proto of protocols) {
                        const idx = l.indexOf(proto);
                        if (idx !== -1) return l.substring(idx);
                    }
                    return null;
                }).filter(l => l !== null);

                allFound = allFound.concat(extracted);
                log('Extracted: ' + extracted.length, true);
                
            } catch (e) {
                log('Error: Не удалось получить данные из источника ' + (i + 1));
                console.error(e);
            }
        }

        allFound = [...new Set(allFound)];

        let priority = [];
        let others = [];

        allFound.forEach(proxy => {
            let isPriority = false;
            tags.forEach(tag => {
                if (proxy.toUpperCase().includes(tag)) isPriority = true;
            });
            if (isPriority) priority.push(proxy);
            else others.push(proxy);
        });

        finalSelection = priority.concat(others);
        
        log('--------------------------------');
        log('ОБРАБОТКА ЗАВЕРШЕНА', true);
        log('Priority nodes: ' + priority.length);
        log('Total unique nodes: ' + finalSelection.length, true);
    }

    function copy() {
        if (!finalSelection.length) { log('Ошибка: Нечего копировать.'); return; }
        navigator.clipboard.writeText(finalSelection.join('\n'))
            .then(() => log('SUCCESS: Ссылки скопированы в буфер.', true));
    }

    function download() {
        if (!finalSelection.length) { log('Ошибка: Нечего скачивать.'); return; }

        const blob = new Blob([finalSelection.join('\n')], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        a.href = url;
        a.download = 'proxies.txt';
        a.click();

        URL.revokeObjectURL(url);
        log('Файл proxies.txt скачан.', true);
    }

    executeBtn.onclick = run;
    copyBtn.onclick = copy;
    downloadBtn.onclick = download;

})();
</script>

</body>
</html>
