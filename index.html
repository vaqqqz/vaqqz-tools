<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy CLI Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Проверка прокси</h1>
        <div class="blinking-cursor"></div>
    </div>
    
    <div class="input-group">
        <label>// Введите ссылки на TXT-файлы (каждая с новой строки)</label>
        <textarea id="urls" placeholder="https://raw.githubusercontent.com/..."></textarea>
    </div>
    
    <div class="controls">
        <button id="executeBtn">ОТСОРТИРОВАТЬ</button>
        <button id="copyBtn">СКОПИРОВАТЬ КОНФИГИ</button>
        <button id="downloadBtn">СКАЧАТЬ TXT</button>
    </div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="terminal-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="terminal-title">bash — root@proxy-node:~</div>
        </div>
        <div class="terminal-body" id="output">
            <span class="terminal-line">
                <span class="terminal-prefix">$</span> Система готова. Ожидание команды...
            </span>
        </div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const outputDiv = document.getElementById('output');
    const executeBtn = document.getElementById('executeBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const urlsInput = document.getElementById('urls');

    let finalProxies = [];

    /* ---------- LOG ---------- */
    function log(text, success = false) {
        const line = document.createElement('span');
        line.className = 'terminal-line' + (success ? ' success' : '');

        const prefix = document.createElement('span');
        prefix.className = 'terminal-prefix';
        prefix.textContent = '$';

        line.appendChild(prefix);
        line.append(' ' + text);

        outputDiv.appendChild(line);

        if (outputDiv.children.length > 300) {
            outputDiv.removeChild(outputDiv.firstChild);
        }

        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    /* ---------- FETCH WITH TIMEOUT ---------- */
    async function fetchWithTimeout(url, timeout = 8000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);

        try {
            return await fetch(url, { signal: controller.signal });
        } finally {
            clearTimeout(id);
        }
    }

    /* ---------- FETCH PROXIES ---------- */
    async function fetchProxies(url, index, total, uniqueSet) {
        log(`Запрос [${index}/${total}]: Загрузка...`);

        try {
            const apiUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
            const response = await fetchWithTimeout(apiUrl);

            if (!response.ok) throw new Error();

            const data = await response.json();

            if (!data.contents) {
                log('FAIL: Пустой ответ.');
                return;
            }

            const lines = data.contents.split('\n');

            const filtered = lines
                .map(l => l.trim())
                .filter(line =>
                    line.startsWith('vless://') ||
                    line.startsWith('vmess://') ||
                    line.startsWith('trojan://') ||
                    line.startsWith('ss://') ||
                    line.startsWith('hysteria://') ||
                    line.startsWith('tuic://')
                );

            if (filtered.length === 0) {
                log('FAIL: Прокси не найдены.');
                return;
            }

            filtered.forEach(p => uniqueSet.add(p));

            log(OK: ${filtered.length} конфигов, true);
    } catch (e) {
            log('ОШИБКА: Не удалось загрузить.');
        }
    }

    /* ---------- MAIN ---------- */
    async function startProcessing() {
        const urlsText = urlsInput.value.trim();

        if (!urlsText) {
            log('ОШИБКА: Список пуст.');
            return;
        }

        executeBtn.disabled = true;
        executeBtn.classList.add('loading');

        outputDiv.innerHTML = '';
        finalProxies = [];

        const urls = urlsText
            .split('\n')
            .map(u => u.trim())
            .filter(Boolean);

        const uniqueSet = new Set();

        log(`Запуск... Источников: ${urls.length}`);

        await Promise.all(
            urls.map((url, i) => fetchProxies(url, i + 1, urls.length, uniqueSet))
        );

        finalProxies = Array.from(uniqueSet);

        log('-----------------------------------');
        log(`ГОТОВО. Уникальных прокси: ${finalProxies.length}, true`);

        executeBtn.disabled = false;
        executeBtn.classList.remove('loading');
    }

    /* ---------- COPY ---------- */
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
    }

    function copyData() {
        if (finalProxies.length === 0) {
            log('ОШИБКА: Нечего копировать.');
            return;
        }

        const text = finalProxies.join('\n');

        if (navigator.clipboard) {
            navigator.clipboard.writeText(text)
                .then(() => log('Скопировано в буфер.', true))
                .catch(() => {
                    fallbackCopy(text);
                    log('Скопировано (fallback).', true);
                });
        } else {
            fallbackCopy(text);
            log('Скопировано (fallback).', true);
        }
    }

    /* ---------- DOWNLOAD ---------- */
    function downloadFile(filename, text) {
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;

        document.body.appendChild(a);
        a.click();

        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function downloadData() {
        if (finalProxies.length === 0) {
            log('ОШИБКА: Нечего скачивать.');
            return;
        }

        const text = finalProxies.join('\n');

        const date = new Date()
            .toISOString()
            .slice(0,19)
            .replace(/[:T]/g, '-');

        const filename = proxies_${date}.txt;

        downloadFile(filename, text);

        log(Файл ${filename} скачан., true);
    }

    executeBtn.onclick = startProcessing;
    copyBtn.onclick = copyData;
    downloadBtn.onclick = downloadData;
});
</script>

</body>
</html>
